<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 1020" width="780" height="1020" font-family="Times New Roman, serif">

  <!-- Background -->
  <rect width="780" height="1020" fill="#ffffff"/>

  <!-- ══════════════════════════════════════════════════════
       DRIVING OBSERVATION
  ══════════════════════════════════════════════════════ -->
  <rect x="40" y="20" width="700" height="80" rx="4" ry="4"
        fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="390" y="48" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold" font-style="italic">Driving Observation</text>
  <text x="390" y="68" text-anchor="middle" fill="#dddddd" font-size="11">Dice similarity coefficient collapses to zero for any false-positive pixel</text>
  <text x="390" y="84" text-anchor="middle" fill="#dddddd" font-size="11">on empty ground-truth masks — distorting model rankings on mixed datasets</text>

  <!-- Arrow 0→1 -->
  <line x1="390" y1="100" x2="390" y2="128" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════
       PHASE 1 — MATHEMATICAL ANALYSIS
  ══════════════════════════════════════════════════════ -->
  <rect x="40" y="132" width="700" height="108" rx="4" ry="4"
        fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <!-- Phase label tab -->
  <rect x="40" y="132" width="160" height="22" rx="0" ry="0" fill="#555555"/>
  <text x="120" y="147" text-anchor="middle" fill="#ffffff" font-size="10.5" font-weight="bold">Phase 1 · Mathematical Analysis</text>

  <text x="390" y="172" text-anchor="middle" fill="#111111" font-size="11" font-weight="bold">Formal Proof of the Empty-Mask Pathology</text>
  <text x="390" y="191" text-anchor="middle" fill="#333333" font-size="10.5">For any TP = 0 case:  Dice(ŷ, y) = 0  whenever  |ŷ| &gt; 0</text>
  <text x="390" y="210" text-anchor="middle" fill="#333333" font-size="10.5">→ Derives ranking-inversion boundary condition as function of normal-case proportion π₋</text>
  <text x="390" y="228" text-anchor="middle" fill="#555555" font-size="10" font-style="italic">Output: closed-form threshold at which metric ordering can reverse</text>

  <!-- Arrow 1→2 -->
  <line x1="390" y1="240" x2="390" y2="268" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════
       PHASE 2 — SIMULATION STUDY
  ══════════════════════════════════════════════════════ -->
  <rect x="40" y="272" width="700" height="108" rx="4" ry="4"
        fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <rect x="40" y="272" width="140" height="22" rx="0" ry="0" fill="#555555"/>
  <text x="110" y="287" text-anchor="middle" fill="#ffffff" font-size="10.5" font-weight="bold">Phase 2 · Simulation Study</text>

  <text x="390" y="312" text-anchor="middle" fill="#111111" font-size="11" font-weight="bold">Bootstrap Simulation of Metric Distortion</text>
  <text x="390" y="331" text-anchor="middle" fill="#333333" font-size="10.5">200 bootstrap runs · N = 780 · seed = 42 · π₋ swept from 0 % to 60 %</text>
  <text x="390" y="350" text-anchor="middle" fill="#333333" font-size="10.5">→ Quantifies ranking-inversion onset; identifies critical threshold at π₋ ≈ 20 %</text>
  <text x="390" y="368" text-anchor="middle" fill="#555555" font-size="10" font-style="italic">Output: distortion curves · inversion threshold empirically confirmed</text>

  <!-- Arrow 2→3 -->
  <line x1="390" y1="380" x2="390" y2="408" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════
       PHASE 3 — EMPIRICAL VALIDATION  (3-column inner layout)
  ══════════════════════════════════════════════════════ -->
  <rect x="40" y="412" width="700" height="178" rx="4" ry="4"
        fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <rect x="40" y="412" width="155" height="22" rx="0" ry="0" fill="#555555"/>
  <text x="117" y="427" text-anchor="middle" fill="#ffffff" font-size="10.5" font-weight="bold">Phase 3 · Empirical Validation</text>

  <!-- 3 inner sub-boxes -->
  <!-- Sub-box A: Models -->
  <rect x="56" y="442" width="200" height="134" rx="3" ry="3"
        fill="#ffffff" stroke="#888888" stroke-width="1"/>
  <text x="156" y="458" text-anchor="middle" fill="#222222" font-size="10.5" font-weight="bold">Five CNN Architectures</text>
  <line x1="66" y1="462" x2="246" y2="462" stroke="#aaaaaa" stroke-width="0.8"/>
  <text x="156" y="476" text-anchor="middle" fill="#444444" font-size="10">U-Net</text>
  <text x="156" y="491" text-anchor="middle" fill="#444444" font-size="10">Attention U-Net</text>
  <text x="156" y="506" text-anchor="middle" fill="#444444" font-size="10">U-Net++</text>
  <text x="156" y="521" text-anchor="middle" fill="#444444" font-size="10">MA-Net</text>
  <text x="156" y="536" text-anchor="middle" fill="#444444" font-size="10">LinkNet</text>
  <text x="156" y="554" text-anchor="middle" fill="#777777" font-size="9.5" font-style="italic">ResNet-34 encoder (all)</text>
  <text x="156" y="568" text-anchor="middle" fill="#777777" font-size="9.5" font-style="italic">BUSI dataset · 780 images</text>

  <!-- Sub-box B: Training -->
  <rect x="290" y="442" width="200" height="134" rx="3" ry="3"
        fill="#ffffff" stroke="#888888" stroke-width="1"/>
  <text x="390" y="458" text-anchor="middle" fill="#222222" font-size="10.5" font-weight="bold">Training Setup</text>
  <line x1="300" y1="462" x2="480" y2="462" stroke="#aaaaaa" stroke-width="0.8"/>
  <text x="390" y="476" text-anchor="middle" fill="#444444" font-size="10">80 / 20 train-test split</text>
  <text x="390" y="491" text-anchor="middle" fill="#444444" font-size="10">Data aug: flip, rotation,</text>
  <text x="390" y="505" text-anchor="middle" fill="#444444" font-size="10">brightness, elastic (Albumentations)</text>
  <text x="390" y="520" text-anchor="middle" fill="#444444" font-size="10">50 epochs · Adam · lr = 1e-4</text>
  <text x="390" y="535" text-anchor="middle" fill="#444444" font-size="10">BCE + Dice loss</text>
  <text x="390" y="554" text-anchor="middle" fill="#777777" font-size="9.5" font-style="italic">PyTorch · MONAI framework</text>
  <text x="390" y="568" text-anchor="middle" fill="#777777" font-size="9.5" font-style="italic">seed = 42 · reproducible</text>

  <!-- Sub-box C: Protocols -->
  <rect x="524" y="442" width="200" height="134" rx="3" ry="3"
        fill="#ffffff" stroke="#888888" stroke-width="1"/>
  <text x="624" y="458" text-anchor="middle" fill="#222222" font-size="10.5" font-weight="bold">Evaluation Protocols</text>
  <line x1="534" y1="462" x2="714" y2="462" stroke="#aaaaaa" stroke-width="0.8"/>
  <text x="624" y="476" text-anchor="middle" fill="#444444" font-size="10" font-weight="bold">P1</text>
  <text x="624" y="490" text-anchor="middle" fill="#444444" font-size="10">Standard Dice (all cases)</text>
  <text x="624" y="508" text-anchor="middle" fill="#444444" font-size="10" font-weight="bold">P2</text>
  <text x="624" y="522" text-anchor="middle" fill="#444444" font-size="10">Audit Dice (positive cases only)</text>
  <text x="624" y="540" text-anchor="middle" fill="#444444" font-size="10" font-weight="bold">P3</text>
  <text x="624" y="554" text-anchor="middle" fill="#444444" font-size="10">Stratified Evaluation</text>
  <text x="624" y="568" text-anchor="middle" fill="#777777" font-size="9.5" font-style="italic">Framework (SEF)</text>

  <!-- Arrow 3→4 -->
  <line x1="390" y1="590" x2="390" y2="618" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════
       PHASE 4 — SEF DESIGN  (2-pathway layout)
  ══════════════════════════════════════════════════════ -->
  <rect x="40" y="622" width="700" height="192" rx="4" ry="4"
        fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <rect x="40" y="622" width="175" height="22" rx="0" ry="0" fill="#333333"/>
  <text x="127" y="637" text-anchor="middle" fill="#ffffff" font-size="10.5" font-weight="bold">Phase 4 · SEF Design &amp; Validation</text>

  <!-- SEF header -->
  <text x="390" y="660" text-anchor="middle" fill="#111111" font-size="11" font-weight="bold">Stratified Evaluation Framework (SEF)</text>
  <text x="390" y="676" text-anchor="middle" fill="#444444" font-size="10">Input partitioned into two mutually exclusive pathways</text>

  <!-- Pathway split line -->
  <line x1="390" y1="685" x2="390" y2="775" stroke="#999999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Left pathway: Positive cases -->
  <rect x="56" y="688" width="305" height="90" rx="3" ry="3"
        fill="#ffffff" stroke="#666666" stroke-width="1"/>
  <text x="208" y="704" text-anchor="middle" fill="#222222" font-size="10.5" font-weight="bold">Positive Cases  (π₊ = 0.829)</text>
  <line x1="66" y1="708" x2="351" y2="708" stroke="#aaaaaa" stroke-width="0.8"/>
  <text x="208" y="722" text-anchor="middle" fill="#444444" font-size="10">437 benign + 210 malignant</text>
  <text x="208" y="737" text-anchor="middle" fill="#444444" font-size="10">Standard Dice similarity coefficient</text>
  <text x="208" y="752" text-anchor="middle" fill="#333333" font-size="10" font-style="italic">→ Dice_seg  (segmentation quality)</text>
  <text x="208" y="768" text-anchor="middle" fill="#777777" font-size="9.5">Pixel-level overlap assessment</text>

  <!-- Right pathway: Normal cases -->
  <rect x="419" y="688" width="305" height="90" rx="3" ry="3"
        fill="#ffffff" stroke="#666666" stroke-width="1"/>
  <text x="571" y="704" text-anchor="middle" fill="#222222" font-size="10.5" font-weight="bold">Normal Cases  (π₋ = 0.171)</text>
  <line x1="429" y1="708" x2="714" y2="708" stroke="#aaaaaa" stroke-width="0.8"/>
  <text x="571" y="722" text-anchor="middle" fill="#444444" font-size="10">133 lesion-free images</text>
  <text x="571" y="737" text-anchor="middle" fill="#444444" font-size="10">True-negative rate on empty masks</text>
  <text x="571" y="752" text-anchor="middle" fill="#333333" font-size="10" font-style="italic">→ Specificity  (FP control)</text>
  <text x="571" y="768" text-anchor="middle" fill="#777777" font-size="9.5">Detection specificity assessment</text>

  <!-- Composite formula -->
  <text x="390" y="798" text-anchor="middle" fill="#111111" font-size="10.5" font-weight="bold">SEF_composite  =  (1 − π₋) · Dice_seg  +  π₋ · Specificity</text>

  <!-- Arrow 4→Output -->
  <line x1="390" y1="814" x2="390" y2="842" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════
       OUTPUT / RECOMMENDATION
  ══════════════════════════════════════════════════════ -->
  <rect x="40" y="846" width="700" height="84" rx="4" ry="4"
        fill="#2b2b2b" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="390" y="870" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Key Outputs &amp; Recommendations</text>
  <text x="390" y="889" text-anchor="middle" fill="#cccccc" font-size="10.5">Ranking-inversion threshold confirmed at π₋ ≈ 20% · Two of five architectures swap rankings under P1 vs P2</text>
  <text x="390" y="907" text-anchor="middle" fill="#cccccc" font-size="10.5">SEF (P3) restores stable, clinically meaningful rankings · Protocol recommended for mixed-population datasets</text>

  <!-- ══════════════════════════════════════════════════════
       ARROWHEAD MARKER
  ══════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333333"/>
    </marker>
  </defs>

  <!-- Caption -->
  <text x="390" y="950" text-anchor="middle" fill="#777777" font-size="9.5" font-style="italic">Figure 1. Overview of the four-phase methodology. Phases 1–2 establish the theoretical and simulated basis for the pathology;</text>
  <text x="390" y="963" text-anchor="middle" fill="#777777" font-size="9.5" font-style="italic">Phase 3 provides empirical validation across five architectures and three protocols; Phase 4 introduces and validates the SEF.</text>

</svg>
